<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetic Item Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="showcase-container">
        <header>
            <h1>Bundle & Skin Vault</h1>
            <p>Select a cosmetic bundle to preview details</p>
        </header>

        <main class="grid-layout">
            <!-- Card 1 -->
            <div class="bundle-card" onclick="selectBundle('Neon Phantom', 'Mythic Outfit', 'A radiant glowing cyberpunk suit with custom animation sets.')">
                <div class="badge rare">Rare</div>
                <div class="placeholder-img cyan-theme"></div>
                <h3>Neon Phantom</h3>
            </div>

            <!-- Card 2 -->
            <div class="bundle-card" onclick="selectBundle('Crimson Rogue', 'Legendary Outfit', 'Classic stealth uniform optimized for high visibility animations.')">
                <div class="badge legendary">Legendary</div>
                <div class="placeholder-img red-theme"></div>
                <h3>Crimson Rogue</h3>
            </div>

            <!-- Card 3 -->
            <div class="bundle-card" onclick="selectBundle('Cobalt Jester', 'Epic Outfit', 'Vibrant trickster attire featuring customized particle effects.')">
                <div class="badge epic">Epic</div>
                <div class="placeholder-img blue-theme"></div>
                <h3>Cobalt Jester</h3>
            </div>
        </main>

        <!-- Preview Modal Section -->
        <section id="preview-panel" class="preview-panel hidden">
            <h2 id="preview-title">Item Name</h2>
            <span id="preview-rarity" class="item-type">Rarity</span>
            <p id="preview-desc">Description text goes here.</p>
            <button onclick="closePreview()">Close Preview</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
